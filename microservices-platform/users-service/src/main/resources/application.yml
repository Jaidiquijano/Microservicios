server:
  port: 8081

spring:
  application:
    name: users-service

  datasource:
    url: jdbc:postgresql://localhost:5433/users_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always