server:
  port: 8082

spring:
  application:
    name: iam-service

  datasource:
    url: jdbc:postgresql://localhost:5435/iam_db
    username: lumara
    password: lumara123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Mismo secret que en gateway-service
app:
  jwt:
    secret: "lumara-super-secret-key-2025-microservices-platform-secure"
    expiration: 86400000   # 24 horas en milisegundos

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always